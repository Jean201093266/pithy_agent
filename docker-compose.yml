version: "3.8"

services:
  pithy-agent:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - pithy-data:/app/data
      - pithy-logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r=requests.get('http://localhost:8000/api/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  pithy-data:
  pithy-logs:

